kind = "web"
  previewPath = "/"
  title = "KEMRI-CGHR Data System"
  version = "1.0.0"
  id = "artifacts/kemri-cghr"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 25686

  [services.development]
  run = "pnpm --filter @workspace/kemri-cghr run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/kemri-cghr", "run", "build" ]
  publicDir = "artifacts/kemri-cghr/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "25686"
  BASE_PATH = "/"
  